apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

apply from: '../variables.gradle'

android {
    namespace 'com.neuronodes.app'
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId 'com.neuronodes.app'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName '1.0.0'
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    signingConfigs {
        release {
            // These values can be set in your local.properties or environment variables for security
            storeFile file(System.getenv("RELEASE_KEYSTORE_PATH") ?: "release-key.keystore")
            storePassword System.getenv("RELEASE_KEYSTORE_PASSWORD") ?: "password"
            keyAlias System.getenv("RELEASE_KEY_ALIAS") ?: "alias"
            keyPassword System.getenv("RELEASE_KEY_PASSWORD") ?: "password"
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    buildFeatures {
        buildConfig true
    }

    packaging {
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE*', 'META-INF/NOTICE*']
        }
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

tasks.register('syncCapacitorWebAssets', Copy) {
    from('../dist')
    into('src/main/assets/public')
    onlyIf {
        file('../dist').exists()
    }
}

preBuild.dependsOn('syncCapacitorWebAssets')

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core-ktx:$androidxCoreVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.activity:activity-ktx:$androidxActivityVersion"
    implementation "androidx.fragment:fragment-ktx:$androidxFragmentVersion"
    implementation "androidx.core:core-splashscreen:$androidxCoreSplashScreenVersion"
    implementation "com.google.android.material:material:$materialVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'